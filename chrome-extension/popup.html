<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e2e;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #cdd6f4;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #313244;
      border-radius: 6px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #a6e3a1; }
    .dot-red { background: #f38ba8; }
    .status-label {
      font-weight: 500;
    }
    .info-section {
      margin-top: 12px;
      padding: 10px;
      background: #313244;
      border-radius: 6px;
    }
    .info-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a6adc8;
      margin-bottom: 6px;
    }
    .info-text {
      font-size: 12px;
      color: #bac2de;
      word-break: break-all;
    }
    .info-time {
      font-size: 10px;
      color: #6c7086;
      margin-top: 4px;
    }
    #btn-reconnect {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-reconnect:hover {
      background: #74c7ec;
    }
    #btn-reconnect:active {
      background: #89dceb;
    }
  </style>
</head>
<body>
  <h1>Local tab bridge</h1>

  <div class="status-row">
    <div id="status-dot" class="status-dot dot-red"></div>
    <span id="status-label" class="status-label">Disconnected</span>
  </div>

  <div class="info-section">
    <h3>Last Prompt Sent</h3>
    <div id="last-prompt" class="info-text">—</div>
    <div id="last-prompt-time" class="info-time"></div>
  </div>

  <div class="info-section">
    <h3>Last Response Received</h3>
    <div id="last-response" class="info-text">—</div>
    <div id="last-response-time" class="info-time"></div>
  </div>

  <button id="btn-reconnect">Reconnect</button>

  <script src="popup.js"></script>
</body>
</html>
